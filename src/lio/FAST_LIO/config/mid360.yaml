/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 3
        max_iteration: 4
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./scan.pcd"

        common:
            lid_topic:  "/livox/lidar"
            imu_topic:  "/livox/imu"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 4
            scan_line:  4
            blind: 0.3
            timestamp_unit: 3
            scan_rate: 10

        mapping:
            acc_cov: 0.3
            gyr_cov: 0.3
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     100.0
            extrinsic_est_en:  false
            extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
            extrinsic_R: [ 1., 0., 0.,
                           0., 1., 0.,
                           0., 0., 1.]

        publish:
            path_en: true
            effect_map_en: false       # 关掉特征点发布, 省CPU
            map_en: false              # 关掉全局地图发布, Open3D用预建PCD
            scan_publish_en:  true
            dense_publish_en: false
            scan_bodyframe_pub_en: true   # 保留: Open3D定位需要 /cloud_registered_body

        pcd_save:
            pcd_save_en: true
            interval: -1
